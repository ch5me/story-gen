# Dasio (Forgejo Actions) CI — story-gen quality gate.
# act_runner on Dell: ubuntu-latest => docker://node:20-bookworm (Node 20, Python 3.11, no pip).
# Node 24 installed via n. GitHub Actions (origin) stays live in parallel — additive only.
name: CI (Dasio)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node 24
        run: |
          npm install -g n
          n 24
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.5.3 --activate

      - name: Configure @ch5me registry
        # Write into the PROJECT .npmrc (not ~/.npmrc): pnpm reads project-level
        # config last, so it shadows the user file. The repo .npmrc ships
        # `_authToken=${NPM_TOKEN}` which pnpm 11 refuses to env-expand for
        # "repository-controlled registry credentials" — so we append the literal
        # token line here, and minimumReleaseAge=0 so EVERY pnpm call in the job
        # (install AND later turbo-script-triggered re-verifies) skips pnpm's
        # default 24h supply-chain hold on @ch5me packages (re)published <24h ago
        # during the registry cutover.
        run: |
          echo "//npm.ch5.me/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc
          echo "minimumReleaseAge=0" >> .npmrc

      - name: Install dependencies
        # minimum_release_age=0: CI installs first-party @ch5me packages that may
        # have been (re)published <24h ago during the registry cutover; pnpm's
        # default 24h supply-chain hold would otherwise reject them.
        run: pnpm install --frozen-lockfile --config.minimumReleaseAge=0
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          npm_config_minimum_release_age: "0"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        continue-on-error: true

      - name: Build
        run: pnpm build
