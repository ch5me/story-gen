# Dasio (Forgejo Actions) CI — story-gen quality gate.
# act_runner on Dell: ubuntu-latest => docker://node:20-bookworm (Node 20, Python 3.11, no pip).
# Node 24 installed via n. GitHub Actions (origin) stays live in parallel — additive only.
name: CI (Dasio)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    # NPM_CONFIG_MINIMUM_RELEASE_AGE=0 propagates to EVERY pnpm process in the job —
    # including the implicit `pnpm install` that `pnpm typecheck`/`build` (turbo)
    # spawn, which re-runs the supply-chain check. A project-.npmrc setting or a
    # CLI flag on the first install does NOT cover those nested invocations; the
    # env var does. Needed because @ch5me packages were (re)published <24h ago
    # during the registry cutover and trip pnpm's default 24h supply-chain hold.
    env:
      NPM_CONFIG_MINIMUM_RELEASE_AGE: "0"
      # Env-var form (not the project .npmrc) is what actually propagates to the
      # pnpm subprocess turbo spawns for each `pnpm typecheck`/`build` — which
      # otherwise re-runs `pnpm install` + the 24h supply-chain check and re-fails.
      NPM_CONFIG_VERIFY_DEPS_BEFORE_RUN: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Install Node 24
        run: |
          npm install -g n
          n 24
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.5.3 --activate

      - name: Configure @ch5me registry
        # Write into the PROJECT .npmrc (pnpm reads project config last; it shadows
        # ~/.npmrc). The repo .npmrc ships `_authToken=${NPM_TOKEN}` which pnpm 11
        # refuses to env-expand, so append the literal token line here.
        #   - minimumReleaseAge=0: skip pnpm's 24h supply-chain hold on @ch5me
        #     packages republished <24h ago during the registry cutover.
        #   - verify-deps-before-run=false: THE key line. pnpm 11 defaults this to
        #     true, so `pnpm typecheck`/`build` (turbo scripts) each re-run a full
        #     `pnpm install` that re-does the supply-chain check — which ignores the
        #     minimumReleaseAge config in that nested context and fails. Disabling
        #     the pre-run verify stops the second install entirely.
        run: |
          echo "//npm.ch5.me/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc
          echo "minimumReleaseAge=0" >> .npmrc
          echo "verify-deps-before-run=false" >> .npmrc

      - name: Install dependencies
        # minimum_release_age=0: CI installs first-party @ch5me packages that may
        # have been (re)published <24h ago during the registry cutover; pnpm's
        # default 24h supply-chain hold would otherwise reject them.
        run: pnpm install --frozen-lockfile --config.minimumReleaseAge=0
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          npm_config_minimum_release_age: "0"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        continue-on-error: true

      - name: Build
        run: pnpm build
