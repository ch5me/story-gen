packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  esbuild: true
  workerd: true
  better-sqlite3: true
  sharp: true
  '@cloudflare/workerd-darwin-64': true
  '@cloudflare/workerd-darwin-arm64': true

overrides:
  # @ch5me/motion@0.3.1 was published without its dist/ — pin to 0.3.2 (ships
  # dist) so the @ch5me/ch5-ui-web barrel (navigation-menu/sidebar -> motion)
  # imports cleanly. Remove once a fixed 0.3.1 is unnecessary.
  '@ch5me/motion': 0.3.2

nodeLinker: hoisted

# CI installs first-party @ch5me packages (re)published <24h ago during the
# off-GitHub registry cutover; pnpm 11 defaults a 24h supply-chain hold +
# re-verify-before-every-script. Both are inappropriate for trusted internal
# packages and block Dasio/GitHub CI. Workspace-level config is the only layer
# turbo-spawned per-package `pnpm run` children inherit (.npmrc/env/CLI flags do not).
minimumReleaseAge: 0
verifyDepsBeforeRun: false
